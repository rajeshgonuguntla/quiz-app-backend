spring.application.name=quiz-app

server.port=${PORT:8451}


# Google GenAI Configuration
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.project-id=gen-lang-client-0990667514
spring.ai.google.genai.location=us-central1
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

#OAuth2 Client Configuration
spring.security.oauth2.client.registration.google.client-id=944587700647-v4d2dqg9io3q3qbgjoif32g21bcifg9s.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# JWT Configuration (Base64 encoded secret)
jwt.secret=${JWT_SECRET_BASE64:VGhpc0lzQVNlY3VyZUFuZExvbmdFbm91Z2hTdW1tZXJUaW1lS2V5MTIzNDU2Nzg5MA==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Cloud Logging / Cloud Trace correlation
gcp.project-id=${GOOGLE_CLOUD_PROJECT:}

# Playlist Processing Configuration
# Enable batch processing for large playlists (>= this threshold)
playlist.large-batch-threshold=${PLAYLIST_BATCH_THRESHOLD:20}
# Maximum tokens per batch (Gemini 2.5 Flash has ~1M token limit, being conservative)
playlist.batch.max-tokens=${PLAYLIST_BATCH_MAX_TOKENS:100000}
# Enable parallel processing for batches (1=enabled, 0=disabled)
playlist.batch.parallel-enabled=${PLAYLIST_BATCH_PARALLEL_ENABLED:1}

